<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="generator" content="oCMS - https://ocms.tech">
    <title>{{.SiteName}} - API Documentation</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/static/dist/swagger-ui/swagger-ui.css">
    <style>
        html, body { margin: 0; padding: 0; background: #fafafa; }
        .topbar { display: none; }
    </style>
</head>
<body>
<div id="swagger-ui"></div>
<script src="/static/dist/swagger-ui/swagger-ui-bundle.js" nonce="{{.CSPNonce}}"></script>
<script src="/static/dist/swagger-ui/swagger-ui-standalone-preset.js" nonce="{{.CSPNonce}}"></script>
<script nonce="{{.CSPNonce}}">
window.addEventListener('load', function () {
    window.ui = SwaggerUIBundle({
        url: '/api/v1/openapi.json',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: 'BaseLayout',
        docExpansion: 'list',
        tryItOutEnabled: true,
        persistAuthorization: false
    });
});
</script>
</body>
</html>
