# oCMS Log Rotation Configuration
#
# This file is auto-generated by generate-logrotate.sh from /etc/ocms/sites.conf.
# Do not edit manually — re-run the generator after adding/removing sites.
#
# Install: sudo /opt/ocms/generate-logrotate.sh

# Backup cron log
/var/log/ocms-backup.log {
    su root root
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
}
